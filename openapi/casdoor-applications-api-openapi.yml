openapi: 3.1.0
info:
  title: Casdoor REST Applications API
  description: 'Casdoor is an open-source IAM/SSO platform exposing a RESTful API for managing

    users, organizations, applications, roles, permissions, sessions, and OIDC/OAuth

    flows. This best-effort OpenAPI is derived from the public Swagger published at

    https://door.casdoor.com/swagger/ and the documentation at https://casdoor.ai/docs/.

    '
  version: 1.503.0
  contact:
    name: Casdoor (Casbin)
    email: casbin@googlegroups.com
    url: https://casdoor.ai/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://door.casdoor.com
  description: Casdoor public demo instance
- url: https://{host}
  description: Self-hosted Casdoor instance
  variables:
    host:
      default: localhost:8000
security:
- bearerAuth: []
- basicAuth: []
tags:
- name: Applications
  description: OAuth/OIDC client applications
paths:
  /api/get-applications:
    get:
      tags:
      - Applications
      summary: List applications
      operationId: getApplications
      parameters:
      - in: query
        name: owner
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Application list
  /api/get-application:
    get:
      tags:
      - Applications
      summary: Get an application
      operationId: getApplication
      parameters:
      - in: query
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Application
  /api/add-application:
    post:
      tags:
      - Applications
      summary: Create an application
      operationId: addApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Create result
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic
