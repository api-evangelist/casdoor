aid: casdoor
name: Casdoor
description: >-
  Casdoor is an open-source, AI-first identity and access management (IAM) and
  MCP gateway authentication server with a web UI. Built in Go (Beego) with a
  React frontend, Casdoor supports OAuth 2.0, OIDC, SAML 2.0, CAS, LDAP,
  Kerberos/SPNEGO, WebAuthn / Passkeys, TOTP / MFA, SCIM 2.0 provisioning,
  social login, multi-tenant organizations, role-based access control, and an
  MCP Gateway plus A2A Protocol for agent-to-agent communication. The platform
  exposes a RESTful API documented via Swagger and ships SDKs for Go, Java,
  Python, Node.js, C#, C++, PHP, Ruby, JavaScript, Lua, and Haskell. Released
  under the Apache License 2.0.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
