apis:
  - aid: casdoor:casdoor-rest-api
    name: Casdoor REST API
    description: >-
      The Casdoor REST API provides programmatic access to the IAM platform's
      core resources including users, organizations, applications, roles,
      groups, permissions, identity providers, tokens, sessions, certificates,
      adapters, syncers, webhooks, products, payments, MFA enrollments, and
      enforcers. The API follows RESTful conventions with JSON payloads and
      is documented via a hosted Swagger UI.
    humanURL: https://casdoor.ai/docs/basic/api
    baseURL: https://door.casdoor.com
    tags:
      - Applications
      - IAM
      - Organizations
      - REST
      - Roles
      - Sessions
      - Tokens
      - Users
    properties:
      - type: Documentation
        url: https://casdoor.ai/docs/basic/api
      - type: Swagger
        url: https://door.casdoor.com/swagger/
      - type: GitHub Repository
        url: https://github.com/casdoor/casdoor
      - type: Authentication
        url: https://casdoor.ai/docs/basic/core-concepts
  - aid: casdoor:casdoor-oauth-oidc
    name: Casdoor OAuth 2.0 / OIDC Provider
    description: >-
      Casdoor implements an OAuth 2.0 authorization server and OpenID Connect
      identity provider, exposing the standard authorization, token, userinfo,
      revocation, introspection, JWKS, and OIDC discovery endpoints used by
      web, mobile, native, and machine-to-machine clients to obtain ID tokens
      and access tokens.
    humanURL: https://casdoor.ai/docs/how-to-connect/oauth
    tags:
      - Authentication
      - JWT
      - OAuth
      - OIDC
      - SSO
      - Tokens
    properties:
      - type: Documentation
        url: https://casdoor.ai/docs/how-to-connect/oauth
      - type: Discovery
        url: https://door.casdoor.com/.well-known/openid-configuration
      - type: Specification
        url: https://datatracker.ietf.org/doc/html/rfc6749
  - aid: casdoor:casdoor-saml
    name: Casdoor SAML 2.0 Identity Provider
    description: >-
      SAML 2.0 identity provider endpoints in Casdoor that issue SAML
      assertions to enterprise service providers, supporting SSO scenarios for
      legacy and enterprise SaaS applications via standard SAML metadata,
      ACS, and SLO bindings.
    humanURL: https://casdoor.ai/docs/how-to-connect/saml
    tags:
      - Enterprise SSO
      - Federation
      - SAML
      - SSO
    properties:
      - type: Documentation
        url: https://casdoor.ai/docs/how-to-connect/saml
      - type: Specification
        url: http://docs.oasis-open.org/security/saml/v2.0/
  - aid: casdoor:casdoor-cas
    name: Casdoor CAS Server
    description: >-
      Casdoor exposes a CAS (Central Authentication Service) server compatible
      with CAS protocol versions 1.0, 2.0, and 3.0, providing single sign-on
      to applications that integrate via the CAS ticket-validation flow.
    humanURL: https://casdoor.ai/docs/how-to-connect/cas
    tags:
      - Authentication
      - CAS
      - SSO
    properties:
      - type: Documentation
        url: https://casdoor.ai/docs/how-to-connect/cas
  - aid: casdoor:casdoor-ldap
    name: Casdoor LDAP Server
    description: >-
      Casdoor provides an LDAP server interface so that legacy applications
      and infrastructure components requiring LDAP authentication can bind
      against Casdoor users and groups, and a sync engine that imports users
      from external LDAP directories.
    humanURL: https://casdoor.ai/docs/ldap/overview
    tags:
      - Directory
      - LDAP
      - Sync
    properties:
      - type: Documentation
        url: https://casdoor.ai/docs/ldap/overview
  - aid: casdoor:casdoor-scim
    name: Casdoor SCIM 2.0 API
    description: >-
      SCIM 2.0 (System for Cross-domain Identity Management) endpoints for
      automated user and group provisioning between Casdoor and downstream
      identity-aware systems.
    humanURL: https://casdoor.ai/docs/scim/overview
    tags:
      - Identity
      - Provisioning
      - SCIM
    properties:
      - type: Documentation
        url: https://casdoor.ai/docs/scim/overview
      - type: Specification
        url: https://datatracker.ietf.org/doc/html/rfc7644
  - aid: casdoor:casdoor-mcp-gateway
    name: Casdoor MCP Gateway
    description: >-
      Casdoor's MCP (Model Context Protocol) gateway and A2A (Agent-to-Agent)
      protocol surface, designed to broker authentication and authorization
      for AI agents and MCP-aware tooling using Casdoor as the identity
      provider.
    humanURL: https://casdoor.ai/docs/mcp/overview
    tags:
      - A2A
      - Agents
      - AI
      - MCP
    properties:
      - type: Documentation
        url: https://casdoor.ai/docs/mcp/overview
  - aid: casdoor:casdoor-webhooks
    name: Casdoor Webhooks
    description: >-
      Outbound webhook events that notify external systems of identity events
      such as user signup, login, logout, profile changes, password resets,
      and MFA enrollments.
    humanURL: https://casdoor.ai/docs/integration/webhook
    tags:
      - Events
      - Integration
      - Webhooks
    properties:
      - type: Documentation
        url: https://casdoor.ai/docs/integration/webhook
